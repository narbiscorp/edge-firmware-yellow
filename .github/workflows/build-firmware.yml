# ──────────────────────────────────────────────────────────────────
# EDGE Smart Glasses — Firmware CI/CD
# ──────────────────────────────────────────────────────────────────
# Repo:  dgvinc/edge-firmware
# Place: .github/workflows/build-firmware.yml
#
# Every push to main:
#   1. Compiles firmware
#   2. Auto-creates a GitHub Release with the .bin files
#
# Version format: v2026.03.05-abc1234 (date + short commit hash)
# Manual tags (v1.0.0 etc) also trigger a release with that tag name.
# ──────────────────────────────────────────────────────────────────

name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Compile & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          path: v4/Code-Glasses
          command: rm -rf build && idf.py set-target esp32 && idf.py build

      - name: Build info
        id: info
        run: |
          BIN="v4/Code-Glasses/build/ESP32_Ble.bin"
          echo "size=$(stat -c%s "$BIN" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

          # Auto-generate version tag: v2026.03.05-abc1234
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          AUTO_TAG="v$(date -u +'%Y.%m.%d')-${SHORT_SHA}"
          echo "auto_tag=${AUTO_TAG}" >> $GITHUB_OUTPUT

          # Use manual tag if present, otherwise auto-tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${AUTO_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32
          path: |
            v4/Code-Glasses/build/ESP32_Ble.bin
            v4/Code-Glasses/build/bootloader/bootloader.bin
            v4/Code-Glasses/build/partition_table/partition-table.bin
          retention-days: 90

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "Yellow Lens Firmware ${{ steps.info.outputs.tag }}"
          body: |
            ## EDGE Firmware (YELLOW LENS / HV bridge build) ${{ steps.info.outputs.tag }}

            **Built:** ${{ steps.info.outputs.date }}
            **Size:** ${{ steps.info.outputs.size }} bytes
            **Commit:** ${{ github.sha }}
            **Target:** ESP32 (ESP-IDF v5.5.1)

            ### OTA Update
            Download `ESP32_Ble.bin` → open OTA Updater → Connect → Flash.

            ### Wired Flash (first time only)
            | File | Address |
            |------|---------|
            | bootloader.bin | 0x1000 |
            | partition-table.bin | 0x8000 |
            | ESP32_Ble.bin | 0x10000 |
          files: |
            v4/Code-Glasses/build/ESP32_Ble.bin
            v4/Code-Glasses/build/bootloader/bootloader.bin
            v4/Code-Glasses/build/partition_table/partition-table.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
